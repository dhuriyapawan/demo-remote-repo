name: Java Gradle Build

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-test:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Build
        uses: gradle/gradle-build-action@v3
        with:
          arguments: build

      - name: Test
        uses: gradle/gradle-build-action@v3
        with:
          arguments: test

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: build/libs